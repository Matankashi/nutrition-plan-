<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>תכנית תזונה</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyBfxiFf8zcSmT7TlvHcHc4_NZoPxN_jz0w",
      authDomain: "nutrition-plan-5ce1f.firebaseapp.com",
      databaseURL: "https://nutrition-plan-5ce1f-default-rtdb.firebaseio.com",
      projectId: "nutrition-plan-5ce1f",
      storageBucket: "nutrition-plan-5ce1f.firebasestorage.app",
      messagingSenderId: "1019976182145",

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080f0a; -webkit-tap-highlight-color: transparent; }
    input, button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a1a0c; }
    ::-webkit-scrollbar-thumb { background: #1a3a1f; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ─── helpers ────────────────────────────────────────────────────────────────
    const db = firebase.database();
    let CURRENT_USER = "guest";

    function usePersist(key, initial) {
      const [val, setVal] = useState(initial);

      useEffect(() => {
        const path = 'nutrition/' + CURRENT_USER + '/' + key;
        db.ref(path).on('value', snap => {
          if (snap.exists()) setVal(snap.val());
        });
        return () => db.ref(path).off();
      }, [key]);

      const update = (newVal) => {
        setVal(prev => {
          const resolved = typeof newVal === 'function' ? newVal(prev) : newVal;
          db.ref('nutrition/' + CURRENT_USER + '/' + key).set(resolved);
          return resolved;
        });
      };

      return [val, update];
    }

    // ─── data ────────────────────────────────────────────────────────────────────
    const DAY_NAMES = ["ראשון", "שני", "שלישי", "רביעי", "חמישי", "שישי", "שבת"];

    const MEALS = [
      { id: 1, time: "08:00–09:00", name: "ארוחת בוקר", emoji: "🌅", cal: 386, pro: 19,
        items: ["2 פרוסות לחם שיפון", "גבינה לבנה 5% — 2 כפות (40g)", "מלפפון + עגבנייה", "½ אבוקדו (60g)", "ביצה קשה אחת"],
        tip: "מים לפני הארוחה. הביצה מחזקת את החלבון לבוקר." },
      { id: 2, time: "12:00", name: "ביניים", emoji: "🥗", cal: 169, pro: 33,
        items: ["סלט ירקות קטן", "טונה במים — קופסה שלמה (160g)"],
        tip: "קופסה שלמה של טונה — לא חצי. מחזיק עד הצהריים." },
      { id: 3, time: "14:00", name: "ארוחת צהריים", emoji: "🍽️", cal: 426, pro: 40,
        items: ["חזה עוף 150g", "אורז מלא מבושל (80g)", "½ בטטה (100g)", "סלט ירקות", "כפית שמן זית (5g)"],
        tip: "שמן זית על הסלט — משפר ספיגת ויטמינים." },
      { id: 4, time: "17:00–18:00", name: "שייק חלבון", emoji: "🥤", cal: 376, pro: 31,
        items: ["אבקת חלבון מנה (30g)", "בננה קטנה (100g)", "15 שקדים / 3 אגוזי מלך / כף חמאת בוטנים", "צ׳יה 5g", "פשתן טחון 5g"],
        tip: "ביום הליכה — חמאת בוטנים. ביום רגיל — אגוזי מלך (אומגה-3)." },
      { id: 5, time: "20:00–21:00", name: "ארוחת ערב", emoji: "🌙", cal: 400, pro: 23,
        items: ["2 ביצים", "2 פרוסות לחם שיפון", "ירקות חתוכים", "גבינה לבנה 5% — 2 כפות (40g)", "כפית שמן זית (5g)"],
        tip: "אם רעב אחרי — יוגורט יווני בלבד, לא מתוק." },
    ];

    const EC = { "⚡":"#fbbf24","🌅":"#fb923c","🥗":"#4ade80","🍽️":"#60a5fa","🥤":"#a78bfa","🍫":"#d4a857","🌙":"#818cf8","🍌":"#facc15","🌃":"#c084fc" };
    const START_W = 86, GOAL_W = 73;

    // minutes from midnight for each meal's active window
    const MEAL_WINDOWS = { 1: [8*60, 11*60+59], 2: [12*60, 13*60+59], 3: [14*60, 16*60+59], 4: [17*60, 19*60+59], 5: [20*60, 23*60+59] };

    const toDateStr = (d) => d.toISOString().split("T")[0];

    const getLast7Days = () => {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        days.push({
          dateStr: toDateStr(d),
          dayName: DAY_NAMES[d.getDay()],
          display: d.toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit" }),
        });
      }
      return days;
    };

    const getActiveMealId = (now) => {
      const mins = now.getHours() * 60 + now.getMinutes();
      for (const [id, [start, end]] of Object.entries(MEAL_WINDOWS)) {
        if (mins >= start && mins <= end) return Number(id);
      }
      // next upcoming meal
      for (const [id, [start]] of Object.entries(MEAL_WINDOWS)) {
        if (mins < start) return Number(id);
      }
      return null;
    };

    // ─── WeightTab ───────────────────────────────────────────────────────────────
    function WeightTab() {
      const [entries, setEntries] = usePersist("weight_entries", [{ week: 0, kg: START_W, label: "התחלה" }]);
      const [input, setInput] = useState("");
      const [expandedMonths, setExpandedMonths] = useState({});
      const toggleMonth = key => setExpandedMonths(p => ({ ...p, [key]: !p[key] }));
      const [dayType, setDayType] = useState("rest");

      const last = entries[entries.length - 1].kg;
      const lost = +(START_W - last).toFixed(1);
      const remaining = +(last - GOAL_W).toFixed(1);
      const pct = Math.min((lost / (START_W - GOAL_W)) * 100, 100);
      const weeksLeft = Math.round(remaining / 0.5);
      const monthsLeft = Math.round(remaining / 2.5);

      const shortDate = (e) => {
        if (e.date) {
          const parts = e.date.split(".");
          if (parts.length >= 2) return parts[0] + "/" + parts[1];
        }
        return e.label;
      };

      const addEntry = () => {
        const kg = parseFloat(input.replace(",", "."));
        if (isNaN(kg) || kg < 50 || kg > 130) return;
        const w = entries[entries.length - 1].week + 1;
        const now = new Date();
        const date = now.toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit", year: "numeric" });
        const label = String(now.getDate()).padStart(2,"0") + "/" + String(now.getMonth()+1).padStart(2,"0");
        setEntries(p => [...p, { week: w, kg, label, date }]);
        setInput("");
      };

      const deleteLastEntry = () => {
        if (entries.length <= 1) return;
        setEntries(p => p.slice(0, -1));
      };

      const parseEntryDate = (e) => {
        if (!e.date) return null;
        const parts = e.date.split(".");
        if (parts.length < 3) return null;
        return new Date(parseInt(parts[2]), parseInt(parts[1]) - 1, parseInt(parts[0]));
      };

      const today = new Date();
      const curMonth = today.getMonth(), curYear = today.getFullYear();
      const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
      const daysRemaining = daysInMonth - today.getDate();
      const monthEntries = entries.filter(e => { const d = parseEntryDate(e); return d && d.getMonth() === curMonth && d.getFullYear() === curYear; });
      const prevEntries = entries.filter(e => { const d = parseEntryDate(e); return d && (d.getFullYear() < curYear || (d.getFullYear() === curYear && d.getMonth() < curMonth)); });
      const monthStart = monthEntries.length > 0 ? monthEntries[0] : (prevEntries.length > 0 ? prevEntries[prevEntries.length - 1] : null);
      const monthEnd = entries[entries.length - 1];
      let monthStat = null;
      if (monthStart && monthEnd && monthStart !== monthEnd) {
        const startDate = parseEntryDate(monthStart) || today;
        const daysElapsed = Math.max(1, Math.round((today - startDate) / 86400000));
        const monthLost = +(monthStart.kg - monthEnd.kg).toFixed(2);
        const projected = +(( monthLost / daysElapsed) * daysInMonth).toFixed(1);
        const pctOfMax = Math.min((monthLost / 3) * 100, 105);
        let status, statusColor;
        if (projected >= 3) { status = "⚡ קצב מצוין!"; statusColor = "#4ade80"; }
        else if (projected >= 2) { status = "✅ בקצב טוב"; statusColor = "#4ade80"; }
        else if (projected >= 1.4) { status = "⚠️ קצת מאחור"; statusColor = "#fbbf24"; }
        else { status = "🔴 מאחור מהיעד"; statusColor = "#f87171"; }
        monthStat = { monthLost, projected, daysRemaining, pctOfMax, status, statusColor };
      }

      const HE_MONTHS = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
      const EN_MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      const monthGroups = [];
      entries.forEach((e, i) => {
        const d = parseEntryDate(e);
        const key = d ? `${d.getFullYear()}-${d.getMonth()}` : `x-${i}`;
        const isCur = d ? (d.getMonth() === curMonth && d.getFullYear() === curYear) : false;
        const mLabel = d ? `${HE_MONTHS[d.getMonth()]} ${String(d.getFullYear()).slice(2)}` : "";
        let g = monthGroups.find(g => g.key === key);
        if (!g) { g = { key, label: mLabel, isCurrent: isCur, entries: [], weekGroups: [] }; monthGroups.push(g); }
        g.entries.push({ ...e, origIdx: i });
        if (d) {
          const weekNum = Math.min(Math.ceil(d.getDate() / 7), 4);
          const wKey = `${key}-w${weekNum}`;
          const wLabel = `${EN_MONTHS[d.getMonth()]} ${String(d.getFullYear()).slice(2)} Week ${weekNum}`;
          let wg = g.weekGroups.find(w => w.key === wKey);
          if (!wg) { wg = { key: wKey, label: wLabel, weekNum, entries: [] }; g.weekGroups.push(wg); }
          wg.entries.push({ ...e, origIdx: i });
        }
      });
      monthGroups.forEach(g => {
        g.weekGroups.forEach(wg => {
          wg.avg = +(wg.entries.reduce((s, e) => s + e.kg, 0) / wg.entries.length).toFixed(2);
        });
        g.monthAvg = g.weekGroups.length > 0
          ? +(g.weekGroups.reduce((s, wg) => s + wg.avg, 0) / g.weekGroups.length).toFixed(2)
          : (g.entries.length > 0 ? g.entries[g.entries.length - 1].kg : null);
      });

      // ── personal stats ────────────────────────────────────────────────────────
      const BIRTHDAY = new Date(1991, 5, 5); // 5.6.1991
      const HEIGHT = 1.75;
      const bmi = +(last / (HEIGHT * HEIGHT)).toFixed(1);
      const age = (() => {
        let a = curYear - BIRTHDAY.getFullYear();
        if (today < new Date(curYear, BIRTHDAY.getMonth(), BIRTHDAY.getDate())) a--;
        return a;
      })();
      const ageMonths = (() => {
        const lastBday = new Date(curYear - (today < new Date(curYear, BIRTHDAY.getMonth(), BIRTHDAY.getDate()) ? 1 : 0), BIRTHDAY.getMonth(), BIRTHDAY.getDate());
        let m = (today.getFullYear() - lastBday.getFullYear()) * 12 + (today.getMonth() - lastBday.getMonth());
        if (today.getDate() < lastBday.getDate()) m--;
        return m;
      })();
      const ageDisplay = `${age}.${String(ageMonths).padStart(2,"0")}`;
      const nextBday = new Date(curYear, BIRTHDAY.getMonth(), BIRTHDAY.getDate());
      if (nextBday <= today) nextBday.setFullYear(curYear + 1);
      const daysToNextBday = Math.ceil((nextBday - today) / 86400000);
      const turningAge = age + 1;

      const GW = 440, GH = 150, PL = 38, PR = 8, PT = 10, PB = 28;
      const iW = GW - PL - PR, iH = GH - PT - PB;
      const allKg = entries.map(e => e.kg);
      const mn = Math.min(...allKg, GOAL_W) - 1.5;
      const mx = Math.max(...allKg) + 1;
      const toX = i => PL + (entries.length > 1 ? (i / (entries.length - 1)) * iW : iW / 2);
      const toY = kg => PT + iH - ((kg - mn) / (mx - mn)) * iH;
      const pts = entries.map((e, i) => toX(i).toFixed(1) + "," + toY(e.kg).toFixed(1)).join(" ");
      const goalY = toY(GOAL_W);

      return (
        <div style={{ padding: "14px 14px 0" }}>
          <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
            {[["משקל נוכחי", last + " ק״ג", "#4ade80"], ["ירדת", lost + " ק״ג", "#60a5fa"], ["נותר", remaining + " ק״ג", "#f87171"]].map(([l,v,c]) => (
              <div key={l} style={{ flex: 1, background: "#0d1f10", borderRadius: 10, border: "1px solid #1a3a1f", padding: "10px 6px", textAlign: "center" }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: c, fontFamily: "monospace" }}>{v}</div>
                <div style={{ fontSize: 10, color: "#4a7a54", marginTop: 2 }}>{l}</div>
              </div>
            ))}
          </div>

          <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 8 }}>
              <span style={{ color: "#4ade80", fontWeight: 700 }}>🎯 יעד: {GOAL_W} ק״ג</span>
              <span style={{ color: "#4a7a54" }}>~{monthsLeft} חודשים נותרו</span>
            </div>
            <div style={{ height: 10, background: "#1a3a1f", borderRadius: 5, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", borderRadius: 5, background: "linear-gradient(90deg,#166534,#4ade80)", transition: "width 0.5s" }} />
            </div>
            <div style={{ textAlign: "center", fontSize: 11, color: "#4a7a54", marginTop: 5 }}>{pct.toFixed(1)}% מהדרך</div>
          </div>

          <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
            <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 10 }}>📊 פרטים אישיים</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 10 }}>
              {[
                ["🎂 גיל", `${ageDisplay}`, `עוד ${daysToNextBday} ימים ל-${turningAge}`],
                ["📏 גובה", `${HEIGHT} מ׳`, ""],
                ["⚖️ משקל", `${last} ק״ג`, ""],
                ["📐 BMI", `${bmi}`, bmi < 18.5 ? "תת משקל" : bmi < 25 ? "תקין" : bmi < 30 ? "עודף קל" : "עודף"],
              ].map(([l, v, sub]) => (
                <div key={l} style={{ background: "#0a1a0c", borderRadius: 8, border: "1px solid #1a3a1f", padding: "8px 10px" }}>
                  <div style={{ fontSize: 10, color: "#4a7a54", marginBottom: 2 }}>{l}</div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#e0f0e0", fontFamily: "monospace" }}>{v}</div>
                  {sub ? <div style={{ fontSize: 9, color: "#4a7a54", marginTop: 2 }}>{sub}</div> : null}
                </div>
              ))}
            </div>
            <div style={{ fontSize: 11, color: "#4ade80", fontWeight: 700, marginBottom: 6 }}>🔥 קלוריות</div>
            <div style={{ fontSize: 11, color: "#c8e8c8", lineHeight: 2 }}>
              BMR (מנוחה מוחלטת): <span style={{ color: "#4ade80", fontWeight: 700 }}>1,775 קל׳</span><br/>
              יום מנוחה (TDEE): <span style={{ color: "#60a5fa", fontWeight: 700 }}>2,350–2,550 קל׳</span><br/>
              יום עבודה בקפה: <span style={{ color: "#60a5fa", fontWeight: 700 }}>+250–700 קל׳</span><br/>
              הליכה 30–40 דק׳: <span style={{ color: "#60a5fa", fontWeight: 700 }}>+150–300 קל׳</span>
            </div>
            <div style={{ marginTop: 8, background: "#0a1a0c", borderRadius: 8, border: "1px solid #1e4a2e", padding: "8px 10px" }}>
              <div style={{ fontSize: 11, color: "#fbbf24", fontWeight: 700, marginBottom: 4 }}>⚡ גירעון באכילה של 2,000 קל׳</div>
              <div style={{ fontSize: 11, color: "#c8e8c8", lineHeight: 1.9 }}>
                יום מנוחה: <span style={{ color: "#4ade80", fontWeight: 700 }}>~350–550 קל׳ גירעון</span><br/>
                יום עבודה / הליכה: <span style={{ color: "#4ade80", fontWeight: 700 }}>~700–1,200 קל׳ גירעון</span>
              </div>
            </div>
          </div>

          {(() => {
            const MENU_CAL = MEALS.reduce((s, m) => s + m.cal, 0);
            const DAY_TYPES = [
              { key: "rest",      label: "🛋 מנוחה",         tdee: [2350, 2550] },
              { key: "work",      label: "☕ עבודה בקפה",    tdee: [2600, 3250] },
              { key: "walk",      label: "🚶 הליכה",          tdee: [2500, 2850] },
              { key: "workwalk",  label: "☕🚶 עבודה+הליכה", tdee: [2750, 3550] },
            ];
            const dt = DAY_TYPES.find(d => d.key === dayType);
            const defMin = dt.tdee[0] - MENU_CAL;
            const defMax = dt.tdee[1] - MENU_CAL;
            return (
              <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
                <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 10 }}>⚡ מחשבון גירעון יומי</div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginBottom: 12 }}>
                  {DAY_TYPES.map(d => (
                    <button key={d.key} onClick={() => setDayType(d.key)}
                      style={{ padding: "8px 4px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit", background: dayType === d.key ? "#166534" : "#0a1a0c", color: dayType === d.key ? "#fff" : "#4a7a54", border: `1px solid ${dayType === d.key ? "#4ade80" : "#1a3a1f"}` }}>
                      {d.label}
                    </button>
                  ))}
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0a1a0c", borderRadius: 8, padding: "10px 12px", marginBottom: 8 }}>
                  <span style={{ fontSize: 11, color: "#4a7a54" }}>הוצאה יומית</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#60a5fa", fontFamily: "monospace" }}>{dt.tdee[0].toLocaleString()}–{dt.tdee[1].toLocaleString()} קל׳</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0a1a0c", borderRadius: 8, padding: "10px 12px", marginBottom: 8 }}>
                  <span style={{ fontSize: 11, color: "#4a7a54" }}>התפריט</span>
                  <span style={{ fontSize: 13, fontWeight: 700, color: "#e0f0e0", fontFamily: "monospace" }}>{MENU_CAL.toLocaleString()} קל׳</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#0d2e18", borderRadius: 8, padding: "10px 12px", border: "1px solid #1e4a2e" }}>
                  <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>גירעון משוער</span>
                  <span style={{ fontSize: 15, fontWeight: 700, color: "#4ade80", fontFamily: "monospace" }}>▼ {defMin}–{defMax} קל׳</span>
                </div>
              </div>
            );
          })()}

          {monthStat && (
            <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 12, marginBottom: 10 }}>
                <span style={{ color: "#4ade80", fontWeight: 700 }}>📅 יעד חודשי: 2–3 ק״ג</span>
                <span style={{ color: monthStat.statusColor, fontWeight: 700, fontSize: 11 }}>{monthStat.status}</span>
              </div>
              <div style={{ position: "relative", height: 10, background: "#1a3a1f", borderRadius: 5, marginBottom: 8 }}>
                <div style={{ position: "absolute", top: 0, right: 0, height: "100%", width: monthStat.pctOfMax + "%", borderRadius: 5, background: "linear-gradient(90deg,#fbbf24,#4ade80)", transition: "width 0.5s" }} />
                {[2,3].map(target => (
                  <div key={target} style={{ position: "absolute", top: -3, right: (target/3*100) + "%", width: 2, height: 16, background: "#4a7a54", borderRadius: 1 }} />
                ))}
              </div>
              <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#4a7a54" }}>
                <span>ירדת החודש: <span style={{ color: "#e0f0e0", fontWeight: 700 }}>{monthStat.monthLost} ק״ג</span></span>
                <span>תחזית: <span style={{ color: "#60a5fa", fontWeight: 700 }}>{monthStat.projected} ק״ג</span></span>
                <span>{monthStat.daysRemaining} ימים נותרו</span>
              </div>
            </div>
          )}

          <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12, overflowX: "auto" }}>
            <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 8 }}>📈 גרף ירידה במשקל</div>
            <svg width={GW} height={GH} style={{ display: "block", maxWidth: "100%" }}>
              {[0, 0.33, 0.67, 1].map(f => {
                const y = PT + f * iH;
                const v = (mx - f * (mx - mn)).toFixed(1);
                return (
                  <g key={f}>
                    <line x1={PL} y1={y} x2={GW - PR} y2={y} stroke="#1a3a1f" strokeWidth={1} />
                    <text x={PL - 3} y={y + 4} textAnchor="end" fontSize={8} fill="#4a7a54">{v}</text>
                  </g>
                );
              })}
              <line x1={PL} y1={goalY} x2={GW - PR} y2={goalY} stroke="#4ade8055" strokeWidth={1.5} strokeDasharray="4,3" />
              <text x={GW - PR - 2} y={goalY - 4} textAnchor="end" fontSize={8} fill="#4ade80">יעד {GOAL_W}</text>
              {entries.length > 1 && (() => {
                const idealEnd = Math.max(entries[0].kg - (entries.length - 1) * 0.5, GOAL_W);
                return <line x1={toX(0).toFixed(1)} y1={toY(entries[0].kg).toFixed(1)} x2={toX(entries.length - 1).toFixed(1)} y2={toY(idealEnd).toFixed(1)} stroke="#fbbf2450" strokeWidth={1.5} strokeDasharray="3,3" />;
              })()}
              {entries.length > 1 && <polyline points={pts} fill="none" stroke="#4ade80" strokeWidth={2} strokeLinejoin="round" />}
              {entries.map((e, i) => (
                <g key={i}>
                  <circle cx={toX(i).toFixed(1)} cy={toY(e.kg).toFixed(1)} r={4} fill="#4ade80" stroke="#0d1f10" strokeWidth={1.5} />
                  <text x={toX(i).toFixed(1)} y={GH - PB + 14} textAnchor="middle" fontSize={8} fill="#4a7a54">{shortDate(e)}</text>
                </g>
              ))}
            </svg>
            <div style={{ fontSize: 10, color: "#4a7a54", marginTop: 4 }}>
              <span style={{ color: "#fbbf24" }}>── </span>קצב אידיאלי &nbsp;
              <span style={{ color: "#4ade80" }}>── </span>בפועל &nbsp;
              <span style={{ color: "#4ade8055" }}>- - </span>יעד
            </div>
          </div>

          <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
            <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 10 }}>➕ הוסף שקילה</div>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === "Enter" && addEntry()}
                placeholder="למשל: 81.5" inputMode="decimal"
                style={{ flex: 1, background: "#0a1a0c", border: "1px solid #2d5a3a", borderRadius: 8, padding: "9px 12px", color: "#e0f0e0", fontSize: 14, fontFamily: "inherit", direction: "ltr", outline: "none" }} />
              <button onClick={addEntry} style={{ background: "#166534", border: "none", borderRadius: 8, padding: "9px 18px", color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 13, fontFamily: "inherit" }}>שמור</button>
            </div>
            <div style={{ fontSize: 11, color: "#4a7a54", marginTop: 8 }}>💡 בוקר, בצום, אותה שעה ואותם בגדים</div>
          </div>


          {entries.length > 1 && (
            <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 20 }}>
              <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 10 }}>📋 היסטוריית שקילות</div>
              {(() => {
                let prevWeekAvg = null;
                return monthGroups.map((g, gi) => {
                  const renderWeekRow = (wg, wi, diff, isLastInSection) => {
                    const expanded = !!expandedMonths[wg.key];
                    const first = wg.entries[0];
                    const last = wg.entries[wg.entries.length - 1];
                    const trend = diff !== null ? diff : +(last.kg - first.kg).toFixed(2);
                    return (
                      <div key={wg.key} style={{ marginBottom: 4 }}>
                        {expanded
                          ? wg.entries.map((e, ei) => {
                              const d = ei === 0 ? null : +(e.kg - wg.entries[ei - 1].kg).toFixed(1);
                              return (
                                <div key={e.origIdx} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #0f2a12" }}>
                                  <div style={{ fontSize: 12, color: "#c8e8c8" }}>{e.date || e.label}</div>
                                  <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: "#e0f0e0" }}>{e.kg} ק״ג</span>
                                  {d !== null
                                    ? <span style={{ fontSize: 12, fontFamily: "monospace", minWidth: 48, textAlign: "left", color: d < 0 ? "#4ade80" : d > 0 ? "#f87171" : "#4a7a54" }}>{d < 0 ? "▼" : d > 0 ? "▲" : "="} {Math.abs(d)}</span>
                                    : <span style={{ minWidth: 48 }} />}
                                </div>
                              );
                            })
                          : (
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #0f2a12" }}>
                              <div style={{ fontSize: 12, color: "#c8e8c8" }}>{first.date || first.label}</div>
                              <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: "#e0f0e0" }}>{first.kg} ק״ג</span>
                              <span style={{ minWidth: 48 }} />
                            </div>
                          )
                        }
                        <div onClick={() => toggleMonth(wg.key)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 8px", background: "#0a1a0c", borderRadius: 7, marginBottom: 2, cursor: "pointer" }}>
                          <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>{wg.label} <span style={{ fontSize: 10, color: "#4a7a54" }}>{expanded ? "▲" : "▼"}</span></div>
                          <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: "#e0f0e0" }}>{wg.avg} ק״ג</span>
                          <span style={{ fontSize: 12, fontFamily: "monospace", minWidth: 48, textAlign: "left", color: trend < 0 ? "#4ade80" : trend > 0 ? "#f87171" : "#4a7a54" }}>{trend < 0 ? "▼" : trend > 0 ? "▲" : "="} {Math.abs(trend)}</span>
                        </div>
                      </div>
                    );
                  };
                  if (g.isCurrent) {
                    return g.weekGroups.map((wg, wi) => {
                      const diff = prevWeekAvg !== null ? +(wg.avg - prevWeekAvg).toFixed(2) : null;
                      prevWeekAvg = wg.avg;
                      return renderWeekRow(wg, wi, diff, wi === g.weekGroups.length - 1);
                    });
                  } else {
                    const lastWeekAvg = g.weekGroups.length > 0 ? g.weekGroups[g.weekGroups.length - 1].avg : null;
                    const monthDiff = prevWeekAvg !== null && g.monthAvg !== null ? +(g.monthAvg - prevWeekAvg).toFixed(2) : null;
                    prevWeekAvg = lastWeekAvg;
                    const expanded = !!expandedMonths[g.key];
                    const firstEntry = g.entries[0];
                    const trend = monthDiff !== null ? monthDiff : +(g.monthAvg - firstEntry.kg).toFixed(2);
                    return (
                      <div key={g.key} style={{ marginBottom: 6 }}>
                        {expanded
                          ? g.weekGroups.map((wg, wi) => {
                              const d = wi === 0 ? null : +(wg.avg - g.weekGroups[wi - 1].avg).toFixed(2);
                              return renderWeekRow(wg, wi, d, wi === g.weekGroups.length - 1);
                            })
                          : (
                            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 0", borderBottom: "1px solid #0f2a12" }}>
                              <div style={{ fontSize: 12, color: "#c8e8c8" }}>{firstEntry.date || firstEntry.label}</div>
                              <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: "#e0f0e0" }}>{firstEntry.kg} ק״ג</span>
                              <span style={{ minWidth: 48 }} />
                            </div>
                          )
                        }
                        <div onClick={() => toggleMonth(g.key)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 8px", background: "#0a1a0c", borderRadius: 7, borderBottom: gi < monthGroups.length - 1 ? "1px solid #1a3a1f" : "none", marginBottom: 2, cursor: "pointer" }}>
                          <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>{g.label} <span style={{ fontSize: 10, color: "#2d5a3a" }}>{expanded ? "▲" : "▼"}</span></div>
                          <span style={{ fontSize: 14, fontWeight: 700, fontFamily: "monospace", color: "#e0f0e0" }}>{g.monthAvg} ק״ג</span>
                          <span style={{ fontSize: 12, fontFamily: "monospace", minWidth: 48, textAlign: "left", color: trend < 0 ? "#4ade80" : trend > 0 ? "#f87171" : "#4a7a54" }}>{trend < 0 ? "▼" : trend > 0 ? "▲" : "="} {Math.abs(trend)}</span>
                        </div>
                      </div>
                    );
                  }
                });
              })()}
            </div>
          )}
        </div>
      );
    }

    // ─── PlanTab ─────────────────────────────────────────────────────────────────
    let GEMINI_API_KEY = "";
    db.ref("nutrition/_admin/geminiKey").once("value", snap => { if (snap.val()) GEMINI_API_KEY = snap.val(); });

    const getWeekDays = (offset = 0) => {
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i - offset * 7);
        days.push({ dateStr: toDateStr(d), dayName: DAY_NAMES[d.getDay()], display: d.toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit" }) });
      }
      return days;
    };

    function PlanTab() {
      const [now, setNow] = useState(new Date());
      useEffect(() => { const t = setInterval(() => setNow(new Date()), 60000); return () => clearInterval(t); }, []);

      const todayStr = toDateStr(now);
      const [weekOffset, setWeekOffset] = useState(0);
      const days = getWeekDays(weekOffset);
      const [activeDateStr, setActiveDateStr] = useState(todayStr);
      const [open, setOpen] = useState(null);
      const [checked, setChecked] = usePersist("plan_checked_v3", {});
      const [customMeals, setCustomMeals] = usePersist("custom_meals_v1", {});
      const [editingMeal, setEditingMeal] = useState(null);
      const [editInput, setEditInput] = useState("");
      const [editMode, setEditMode] = useState("auto"); // "auto" | "manual"
      const [manualCal, setManualCal] = useState("");
      const [aiLoading, setAiLoading] = useState(false);
      const [aiError, setAiError] = useState("");
      const [aiBreakdown, setAiBreakdown] = useState(null);
      const [aiQuestions, setAiQuestions] = useState(null);
      const [aiAnswers, setAiAnswers] = useState("");

      const isViewingToday = activeDateStr === todayStr;
      const activeMealId = isViewingToday ? getActiveMealId(now) : null;

      const getCustom = (mealId) => customMeals[activeDateStr]?.[mealId] || null;
      const getActualCal = (meal) => getCustom(meal.id)?.calories ?? meal.cal;

      const totalCal = MEALS.reduce((s, m) => s + getActualCal(m), 0);
      const planCal  = MEALS.reduce((s, m) => s + m.cal, 0);
      const doneCal  = MEALS.filter(m => checked[activeDateStr + "-" + m.id] || getCustom(m.id)).reduce((s, m) => s + getActualCal(m), 0);
      const doneCount = MEALS.filter(m => checked[activeDateStr + "-" + m.id] || getCustom(m.id)).length;
      const pct = Math.min((doneCal / totalCal) * 100, 100);
      const toggle = id => setChecked(p => ({ ...p, [activeDateStr + "-" + id]: !p[activeDateStr + "-" + id] }));

      const TARGET_CAL = 2000;
      const calGap = doneCal - TARGET_CAL;

      const callGemini = async (prompt) => {
        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
        });
        const data = await res.json();
        const text = data?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "";
        const errMsg = data?.error?.message || "";
        if (!text && errMsg) throw new Error(errMsg);
        const jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error("תגובה לא תקינה מה-AI");
        return JSON.parse(jsonMatch[0]);
      };

      const analyzeNutrition = async (mealId) => {
        if (!editInput.trim()) return;
        setAiLoading(true); setAiError(""); setAiBreakdown(null); setAiQuestions(null);
        try {
          const prompt = `You are a nutrition expert. The user described a meal: "${editInput.trim()}"

If the description is vague and asking 1-2 short clarifying questions would significantly improve accuracy (e.g. drink size, side dish, sauce), return:
{"questions":["question in the same language as the input"]}

Otherwise, estimate calories per item and return:
{"items":[{"name":"item name in the original language","calories":123}],"total":456}

Return ONLY valid JSON, no markdown, no extra text.`;
          const parsed = await callGemini(prompt);
          if (parsed.questions && parsed.questions.length > 0) {
            setAiQuestions({ questions: parsed.questions, mealId });
          } else if (parsed.total) {
            setAiBreakdown({ items: parsed.items || [], total: parsed.total, mealId });
          } else {
            setAiError("לא הצלחתי לחשב. נסה לתאר בצורה יותר ברורה.");
          }
        } catch(e) { setAiError(`שגיאה: ${e.message}`); }
        setAiLoading(false);
      };

      const submitAnswers = async () => {
        if (!aiQuestions) return;
        setAiLoading(true); setAiError(""); setAiQuestions(null);
        try {
          const prompt = `You are a nutrition expert. Estimate calories for this meal.
Original description: "${editInput.trim()}"
Additional details from user: "${aiAnswers}"

Return ONLY valid JSON, no markdown:
{"items":[{"name":"item name in the original language","calories":123}],"total":456}`;
          const parsed = await callGemini(prompt);
          if (parsed.total) {
            setAiBreakdown({ items: parsed.items || [], total: parsed.total, mealId: aiQuestions.mealId });
          } else {
            setAiError("לא הצלחתי לחשב. נסה שוב.");
          }
        } catch(e) { setAiError(`שגיאה: ${e.message}`); }
        setAiAnswers("");
        setAiLoading(false);
      };

      const confirmBreakdown = () => {
        if (!aiBreakdown) return;
        setCustomMeals(prev => ({ ...prev, [activeDateStr]: { ...(prev[activeDateStr] || {}), [aiBreakdown.mealId]: { description: editInput.trim(), calories: aiBreakdown.total } } }));
        setEditingMeal(null); setEditInput(""); setAiBreakdown(null); setAiError(""); setAiQuestions(null); setAiAnswers("");
      };

      const saveManual = (mealId) => {
        const calories = parseInt(manualCal);
        if (!calories || calories < 1) return;
        const desc = editInput.trim() || "ארוחה מותאמת";
        setCustomMeals(prev => ({ ...prev, [activeDateStr]: { ...(prev[activeDateStr] || {}), [mealId]: { description: desc, calories } } }));
        setEditingMeal(null); setEditInput(""); setManualCal(""); setAiError("");
      };

      const clearCustom = (mealId) => {
        setCustomMeals(prev => {
          const d = { ...(prev[activeDateStr] || {}) };
          delete d[mealId];
          return { ...prev, [activeDateStr]: d };
        });
      };

      const activeDay = days.find(d => d.dateStr === activeDateStr) || { dayName: "", display: activeDateStr };

      return (
        <>
          <div style={{ padding: "10px 14px 0" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
              <button onClick={() => { setWeekOffset(w => w + 1); setOpen(null); }} style={{ background: "#0d1f10", border: "1px solid #1a3a1f", borderRadius: 6, color: "#4a7a54", fontSize: 14, cursor: "pointer", padding: "2px 8px", fontFamily: "inherit" }}>‹</button>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3, flex: 1 }}>
                {days.map(day => {
                  const dayDone = MEALS.filter(m => checked[day.dateStr + "-" + m.id] || customMeals[day.dateStr]?.[m.id]).length;
                  const isActive = day.dateStr === activeDateStr;
                  const isToday = day.dateStr === todayStr;
                  return (
                    <button key={day.dateStr} onClick={() => { setActiveDateStr(day.dateStr); setOpen(null); }} style={{
                      background: isActive ? "#166534" : "#0d1f10", border: isToday ? "1px solid #4ade80" : "1px solid #1a3a1f",
                      borderRadius: 8, padding: "6px 2px", cursor: "pointer", textAlign: "center", transition: "all 0.2s",
                    }}>
                      <div style={{ fontSize: 9, color: isActive ? "#4ade80" : "#4a7a54", fontWeight: isToday ? 700 : 400 }}>{day.dayName.slice(0,3)}</div>
                      <div style={{ fontSize: 9, color: isActive ? "#a8d8a8" : "#3a5a3a", marginTop: 1 }}>{day.display}</div>
                      <div style={{ fontSize: 11, fontWeight: 700, color: dayDone === MEALS.length ? "#4ade80" : isActive ? "#e0f0e0" : "#4a7a54", marginTop: 2 }}>
                        {dayDone === MEALS.length ? "✓" : dayDone > 0 ? dayDone + "/" + MEALS.length : "—"}
                      </div>
                    </button>
                  );
                })}
              </div>
              {weekOffset > 0 && <button onClick={() => { setWeekOffset(w => w - 1); setOpen(null); }} style={{ background: "#0d1f10", border: "1px solid #1a3a1f", borderRadius: 6, color: "#4a7a54", fontSize: 14, cursor: "pointer", padding: "2px 8px", fontFamily: "inherit" }}>›</button>}
              {weekOffset === 0 && <div style={{ width: 28 }} />}
            </div>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 4, marginTop: 8 }}>
              <span style={{ fontSize: 13, fontWeight: 700, color: "#4ade80" }}>🍽️ {activeDay.dayName} {activeDay.display}</span>
              <span style={{ fontSize: 11, color: "#4a7a54" }}>{doneCount}/{MEALS.length} · {doneCal} קל׳</span>
            </div>
            {doneCal > 0 && (
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
                <span style={{ fontSize: 10, color: calGap > 200 ? "#f87171" : calGap > 0 ? "#fbbf24" : "#4ade80", fontWeight: 700 }}>
                  {calGap > 0 ? `⚠️ +${calGap} קל׳ מעל היעד` : `✅ ${Math.abs(calGap)} קל׳ מתחת ליעד`}
                </span>
              </div>
            )}
            <div style={{ height: 5, background: "#1a3a1f", borderRadius: 3, overflow: "hidden", marginBottom: 10 }}>
              <div style={{ height: "100%", width: pct + "%", borderRadius: 3, background: "linear-gradient(90deg,#166534,#4ade80)", transition: "width 0.4s" }} />
            </div>
          </div>

          <div style={{ padding: "0 14px 0" }}>
            {MEALS.map(meal => {
              const isOpen = open === activeDateStr + "-" + meal.id;
              const isDone = !!checked[activeDateStr + "-" + meal.id];
              const custom = getCustom(meal.id);
              const isEditing = editingMeal === meal.id;
              const isCurrent = meal.id === activeMealId && !isDone && !custom;
              const ac = EC[meal.emoji] || "#4ade80";
              const actualCal = getActualCal(meal);
              const borderColor = isOpen ? ac + "66" : isCurrent ? ac : (isDone || custom) ? "#1a5a2e" : "#1a3a1f";
              return (
                <div key={meal.id} style={{ marginBottom: 8, borderRadius: 12, border: "1px solid " + borderColor, overflow: "hidden", opacity: (isDone && !custom) ? 0.65 : 1, transition: "all 0.2s", boxShadow: isCurrent ? "0 0 10px " + ac + "44" : "none" }}>
                  <div style={{ background: isOpen ? ac + "14" : isCurrent ? ac + "18" : (isDone || custom) ? "#0a2010" : "#0d1f10", padding: "12px 14px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}
                    onClick={() => setOpen(isOpen ? null : activeDateStr + "-" + meal.id)}>
                    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                      <div onClick={e => { e.stopPropagation(); toggle(meal.id); }}
                        style={{ width: 22, height: 22, borderRadius: 6, flexShrink: 0, border: "2px solid " + ((isDone || custom) ? ac : "#2d5a3a"), background: (isDone || custom) ? ac + "33" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 13, color: ac, fontWeight: 700 }}>
                        {(isDone || custom) ? "✓" : ""}
                      </div>
                      <span style={{ fontSize: 20 }}>{meal.emoji}</span>
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontSize: 14, fontWeight: 600, color: (isDone && !custom) ? "#4a7a54" : "#e0f0e0" }}>{meal.name}</span>
                          {isCurrent && <span style={{ fontSize: 9, background: ac + "33", color: ac, borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>עכשיו</span>}
                          {custom && <span style={{ fontSize: 9, background: "#1e4a2e", color: "#4ade80", borderRadius: 4, padding: "1px 5px", fontWeight: 700 }}>מותאם</span>}
                        </div>
                        <div style={{ fontSize: 11, color: "#4a7a54" }}>{meal.time}</div>
                      </div>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                      <button onClick={e => { e.stopPropagation(); setEditingMeal(isEditing ? null : meal.id); setEditInput(custom?.description || ""); setManualCal(""); setEditMode("auto"); setAiError(""); setAiBreakdown(null); setAiQuestions(null); setAiAnswers(""); }}
                        style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 14, color: custom ? "#4ade80" : "#2d5a3a", padding: "2px 4px" }}>✏️</button>
                      <div style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: custom ? "#4ade80" : ac, fontFamily: "monospace" }}>{actualCal}</div>
                        <div style={{ fontSize: 9, color: "#4a7a54" }}>קל׳</div>
                      </div>
                      <span style={{ color: "#3a5a3a", fontSize: 12, display: "inline-block", transform: isOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>▾</span>
                    </div>
                  </div>
                  {isEditing && (
                    <div style={{ background: "#071510", borderTop: "1px solid #1a3a1f", padding: "12px 14px" }}>
                      <div style={{ display: "flex", gap: 4, marginBottom: 10 }}>
                        {[["auto","🤖 חשב אוטומטי"],["manual","✏️ הכנס ידנית"]].map(([m,l]) => (
                          <button key={m} onClick={() => { setEditMode(m); setAiError(""); }}
                            style={{ flex: 1, padding: "6px", borderRadius: 7, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700, fontFamily: "inherit", background: editMode === m ? "#166534" : "#0a1a0c", color: editMode === m ? "#fff" : "#4a7a54" }}>
                            {l}
                          </button>

    function ChecklistTab() {
      const todayIdx = new Date().getDay();
      const [activeDay, setActiveDay] = useState(todayIdx < 7 ? todayIdx : 0);
      const [checked, setChecked] = usePersist("checklist_checked", {});

      const dayPlan = WEEK_PLAN[activeDay];
      const done = dayPlan.tasks.filter(t => checked[activeDay + "-" + t.id]).length;
      const total = dayPlan.tasks.length;
      const pct = Math.round((done / total) * 100);
      const toggle = (id) => setChecked(p => {
        const key = activeDay + "-" + id;
        if (p[key]) return { ...p, [key]: null };
        const now = new Date();
        const ts = now.toLocaleDateString("he-IL", { day: "2-digit", month: "2-digit" }) + " " +
          now.toLocaleTimeString("he-IL", { hour: "2-digit", minute: "2-digit" });
        return { ...p, [key]: ts };
      });

      const walkDays = [0, 2, 4];

      return (
        <div style={{ padding: "14px 14px 0" }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 4, marginBottom: 14 }}>
            {WEEK_PLAN.map((d, i) => {
              const dayDone = d.tasks.filter(t => checked[i + "-" + t.id]).length;
              const dayPct = Math.round((dayDone / d.tasks.length) * 100);
              const isActive = i === activeDay;
              const isToday = i === todayIdx;
              return (
                <button key={i} onClick={() => setActiveDay(i)} style={{
                  background: isActive ? "#166534" : "#0d1f10",
                  border: isToday ? "1px solid #4ade80" : "1px solid #1a3a1f",
                  borderRadius: 8, padding: "6px 2px", cursor: "pointer",
                  textAlign: "center", transition: "all 0.2s",
                }}>
                  <div style={{ fontSize: 9, color: isActive ? "#4ade80" : "#4a7a54", fontWeight: isToday ? 700 : 400 }}>{d.day.slice(0,3)}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: dayPct === 100 ? "#4ade80" : isActive ? "#e0f0e0" : "#4a7a54", marginTop: 2 }}>
                    {dayPct === 100 ? "✓" : dayDone > 0 ? dayDone + "/" + d.tasks.length : "—"}
                  </div>
                </button>
              );
            })}
          </div>

          <div style={{ background: "#0d1f10", borderRadius: 12, border: "1px solid #1a3a1f", padding: 14, marginBottom: 12 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
              <div>
                <span style={{ fontSize: 15, fontWeight: 700, color: "#4ade80" }}>{dayPlan.day}</span>
                {walkDays.includes(activeDay) && <span style={{ fontSize: 11, color: "#60a5fa", marginRight: 8 }}>🚶 יום הליכה</span>}
                {activeDay === 5 && <span style={{ fontSize: 11, color: "#fbbf24", marginRight: 8 }}>🍕 יום חופשי</span>}
                {activeDay === 6 && <span style={{ fontSize: 11, color: "#4ade80", marginRight: 8 }}>⚖️ יום שקילה</span>}
              </div>
              <span style={{ fontSize: 12, color: pct === 100 ? "#4ade80" : "#4a7a54", fontWeight: 700 }}>{done}/{total} {pct === 100 ? "✅" : ""}</span>
            </div>
            <div style={{ height: 6, background: "#1a3a1f", borderRadius: 3, overflow: "hidden" }}>
              <div style={{ height: "100%", width: pct + "%", borderRadius: 3, background: pct === 100 ? "#4ade80" : "linear-gradient(90deg,#166534,#4ade80)", transition: "width 0.4s" }} />
            </div>
          </div>

          {dayPlan.tasks.map(task => {
            const isDone = !!checked[activeDay + "-" + task.id];
            const color = CAT_COLORS[task.cat] || "#4ade80";
            return (
              <div key={task.id} onClick={() => toggle(task.id)} style={{
                marginBottom: 8, borderRadius: 11,
                border: "1px solid " + (isDone ? color + "55" : "#1a3a1f"),
                background: isDone ? color + "0f" : "#0d1f10",
                padding: "13px 14px", cursor: "pointer",
                display: "flex", alignItems: "center", gap: 12,

              }}>
                <div style={{
                  width: 24, height: 24, borderRadius: 7, flexShrink: 0,
                  border: "2px solid " + (isDone ? color : "#2d5a3a"),
                  background: isDone ? color + "33" : "transparent",
                  display: "flex", alignItems: "center", justifyContent: "center",
                  fontSize: 14, color: color, fontWeight: 700, transition: "all 0.15s",
                }}>{isDone ? "✓" : ""}</div>
                <span style={{ fontSize: 16 }}>{task.cat}</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, color: isDone ? "#4a7a54" : "#c8e8c8", textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4 }}>{task.text}</div>

                  )}
                </div>
              </div>
            );
          })}

            <div style={{ fontSize: 12, color: "#4ade80", fontWeight: 700, marginBottom: 10 }}>📋 סיכום שבועי</div>

              {[
                ["🚶 הליכות", walkDays.reduce((s,di)=>s+(WEEK_PLAN[di].tasks.filter(t=>checked[di+"-"+t.id]&&t.cat==="🚶").length>0?1:0),0) + "/3"],

                  <div style={{ fontSize: 16, fontWeight: 700, color: "#4ade80", fontFamily: "monospace", marginTop: 2 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      );

    // ─── AdminPinScreen ───────────────────────────────────────────────────────────
    function AdminPinScreen({ onSuccess, onBack }) {
      const [pin, setPin] = useState("");
      const [adminPin, setAdminPin] = useState(null);
      const [error, setError] = useState(false);
      const ref = React.useRef(null);

      useEffect(() => {
        ref.current?.focus();
        db.ref("nutrition/_admin/adminPin").once("value", snap => {
          setAdminPin(snap.exists() ? snap.val() : "0000");
        });
      }, []);

      const check = p => {
        const correct = adminPin || "0000";
        if (p === correct) { onSuccess(); }
        else if (p.length === 4) { setError(true); setTimeout(() => { setError(false); setPin(""); }, 800); }
      };
      const press = d => { const next = pin + d; setPin(next); if (next.length === 4 && adminPin !== null) check(next); };
      const handleKey = e => {
        if (e.key >= "0" && e.key <= "9") press(e.key);
        else if (e.key === "Backspace") setPin(p => p.slice(0, -1));
        else if (e.key === "Escape") onBack();
      };

      return (
        <div onKeyDown={handleKey} tabIndex={0} ref={ref} style={{ minHeight: "100vh", background: "linear-gradient(160deg,#080f0a 0%,#0a1520 60%,#080f0a 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 28, fontFamily: "'Segoe UI',Tahoma,sans-serif", outline: "none" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#4a7a54" }}>🔧 כניסת מנהל</div>
          <div style={{ display: "flex", gap: 12, marginBottom: 4 }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", background: pin.length > i ? (error ? "#f87171" : "#4ade80") : "#1a3a1f", border: `2px solid ${error ? "#f87171" : "#2d5a3a"}`, transition: "all 0.15s" }} />
            ))}
          </div>
          {error && <div style={{ color: "#f87171", fontSize: 13, marginTop: -16 }}>קוד שגוי</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 70px)", gap: 10, direction: "ltr" }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d, i) => (
              <button key={i} onClick={() => { if (d === "⌫") setPin(p => p.slice(0,-1)); else if (d !== "") press(String(d)); }}
                style={{ height: 70, borderRadius: 14, border: "1px solid #1a3a1f", background: d === "" ? "transparent" : "#0d1f10", color: d === "⌫" ? "#f87171" : "#e0f0e0", fontSize: d === "⌫" ? 20 : 24, fontWeight: 600, cursor: d === "" ? "default" : "pointer", fontFamily: "inherit" }}>
                {d}
              </button>
            ))}
          </div>
          <button onClick={onBack} style={{ background: "transparent", border: "none", color: "#4a7a54", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>← חזור</button>
        </div>
      );
    }

            const udata = data[username];
            const weightEntries = udata.weight_entries ? (Array.isArray(udata.weight_entries) ? udata.weight_entries : Object.values(udata.weight_entries)) : [];
            const lastEntry = weightEntries.length > 0 ? weightEntries[weightEntries.length - 1] : null;
            return { username, weightCount: weightEntries.length, lastWeight: lastEntry ? lastEntry.kg + " ק״ג" : "—", lastDate: lastEntry ? (lastEntry.date || lastEntry.label || "—") : "—" };
          });
          setUsers(userList);
          setLoading(false);
        });
      }, []);

      useEffect(() => {
        db.ref("nutrition/_admin/users").once("value", snap => {
          if (snap.exists()) {
            setManagedUsers(snap.val());

            setManagedUsers({ matan: { pin: null }, guest: { pin: null } });
          }

      const savePin = async (type) => {
        const val = type === "matan" ? newMatanPin : newAdminPin;
        if (val.length !== 4 || isNaN(val)) return;
        const path = type === "matan" ? "nutrition/_admin/matanPin" : "nutrition/_admin/adminPin";
        await db.ref(path).set(val);
        setSaved(type === "matan" ? "PIN של מתן עודכן ✓" : "PIN מנהל עודכן ✓");
        setTimeout(() => setSaved(""), 2500);
        if (type === "matan") setNewMatanPin(""); else setNewAdminPin("");
      };

      const requireAdminPin = (label, action) => {
        setConfirmAction({ label, onConfirm: () => { setConfirmAction(null); action(); } });
      };

      const addUser = async () => {
        const uname = newUsername.trim().toLowerCase().replace(/\s+/g,"_");

        const pinVal = newUserPin.length === 4 ? newUserPin : null;
        const updated = { ...(managedUsers || {}), [uname]: { pin: pinVal } };
        await db.ref("nutrition/_admin/users").set(updated);
        setManagedUsers(updated);
        setNewUsername(""); setNewUserPin("");
        setSaved(`משתמש "${uname}" נוסף ✓`);
        setTimeout(() => setSaved(""), 2500);
      };

      const deleteUser = async (uname) => {
        const updated = { ...(managedUsers || {}) };

          </div>
          <div style={{ padding: 16, maxWidth: 500, margin: "0 auto" }}>
            {saved && <div style={{ background: "#166534", borderRadius: 10, padding: "10px 14px", marginBottom: 12, fontSize: 13, color: G.green }}>{saved}</div>}

            <div style={{ background: G.card, borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${G.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: G.mid, marginBottom: 14 }}>👥 סטטיסטיקות משתמשים</div>
              {loading ? <div style={{ color: G.mid, fontSize: 13 }}>טוען...</div> : users.length === 0 ? <div style={{ color: G.mid, fontSize: 13 }}>אין נתונים עדיין</div> : users.map(u => (
                <div key={u.username} style={{ background: G.bg, borderRadius: 10, padding: "12px 14px", marginBottom: 8, border: `1px solid ${G.border}` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                    <div style={{ fontSize: 14, fontWeight: 700, color: G.green }}>👤 {u.username}</div>
                    <div style={{ fontSize: 11, color: G.mid }}>שקילה אחרונה: {u.lastDate}</div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                    {[["שקילות", u.weightCount, G.green], ["משקל נוכחי", u.lastWeight, "#60a5fa"]].map(([l,v,c]) => (
                      <div key={l} style={{ textAlign: "center", background: G.card, borderRadius: 8, padding: "6px 4px" }}>
                        <div style={{ fontSize: 16, fontWeight: 700, color: c }}>{v}</div>
                        <div style={{ fontSize: 10, color: G.mid }}>{l}</div>
                      </div>
                    ))}
                  </div>
                </div>

            <div style={{ background: G.card, borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${G.border}` }}>

              {managedUsers && Object.keys(managedUsers).map(uname => (
                <div key={uname} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: G.bg, borderRadius: 8, padding: "8px 12px", marginBottom: 6, border: `1px solid ${G.border}` }}>
                  <div style={{ fontSize: 13, color: G.green }}>👤 {uname}</div>
                  <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                    <div style={{ fontSize: 11, color: G.mid }}>{managedUsers[uname].pin ? "🔒 PIN" : "🔓 ללא PIN"}</div>
                    {uname !== "matan" && (
                      <button onClick={() => requireAdminPin(`למחוק את המשתמש "${uname}"?`, () => deleteUser(uname))}
                        style={{ background: "#7f1d1d", border: "none", borderRadius: 6, padding: "4px 10px", color: "#fca5a5", fontSize: 11, cursor: "pointer", fontFamily: "inherit" }}>מחק</button>
                    )}
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 12, fontSize: 12, color: G.mid, marginBottom: 8 }}>הוסף משתמש חדש:</div>
              <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                <input value={newUsername} onChange={e => setNewUsername(e.target.value)} placeholder="שם משתמש"
                  style={{ flex: 1, background: G.bg, border: `1px solid ${G.border}`, borderRadius: 8, padding: "9px 12px", color: G.text, fontSize: 13, outline: "none", fontFamily: "inherit" }} />
                <input value={newUserPin} onChange={e => setNewUserPin(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="PIN (אופציונלי)" maxLength={4} inputMode="numeric"
                  style={{ width: 110, background: G.bg, border: `1px solid ${G.border}`, borderRadius: 8, padding: "9px 12px", color: G.text, fontSize: 13, outline: "none", direction: "ltr", fontFamily: "inherit" }} />
              </div>
              <button onClick={addUser} disabled={!newUsername.trim()} style={{ background: newUsername.trim() ? "#166534" : "#1a3a1f", border: "none", borderRadius: 8, padding: "9px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: newUsername.trim() ? "pointer" : "default", fontFamily: "inherit", width: "100%" }}>➕ הוסף משתמש</button>
            </div>

            <div style={{ background: G.card, borderRadius: 14, padding: 16, marginBottom: 12, border: `1px solid ${G.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: G.mid, marginBottom: 12 }}>🔑 שנה PIN של Matan</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={newMatanPin} onChange={e => setNewMatanPin(e.target.value.replace(/\D/g,"").slice(0,4))}
                  placeholder="4 ספרות חדשות" maxLength={4} inputMode="numeric"
                  style={{ flex: 1, background: G.bg, border: `1px solid ${G.border}`, borderRadius: 8, padding: "9px 12px", color: G.text, fontSize: 14, outline: "none", direction: "ltr", fontFamily: "inherit" }} />
                <button onClick={() => savePin("matan")} disabled={newMatanPin.length !== 4} style={{ background: newMatanPin.length === 4 ? "#166534" : "#1a3a1f", border: "none", borderRadius: 8, padding: "9px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: newMatanPin.length === 4 ? "pointer" : "default", fontFamily: "inherit" }}>שמור</button>
              </div>
            </div>

            <div style={{ background: G.card, borderRadius: 14, padding: 16, border: `1px solid ${G.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: G.mid, marginBottom: 12 }}>🔧 שנה PIN מנהל</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={newAdminPin} onChange={e => setNewAdminPin(e.target.value.replace(/\D/g,"").slice(0,4))}
                  placeholder="4 ספרות חדשות" maxLength={4} inputMode="numeric"
                  style={{ flex: 1, background: G.bg, border: `1px solid ${G.border}`, borderRadius: 8, padding: "9px 12px", color: G.text, fontSize: 14, outline: "none", direction: "ltr", fontFamily: "inherit" }} />
                <button onClick={() => savePin("admin")} disabled={newAdminPin.length !== 4} style={{ background: newAdminPin.length === 4 ? "#166534" : "#1a3a1f", border: "none", borderRadius: 8, padding: "9px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: newAdminPin.length === 4 ? "pointer" : "default", fontFamily: "inherit" }}>שמור</button>
              </div>
              <div style={{ fontSize: 11, color: G.mid, marginTop: 8 }}>PIN ברירת מחדל: 0000</div>
            </div>

            <div style={{ background: G.card, borderRadius: 14, padding: 16, border: `1px solid ${G.border}` }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: G.mid, marginBottom: 12 }}>🤖 מפתח Gemini AI</div>
              <div style={{ display: "flex", gap: 8 }}>
                <input value={newGeminiKey} onChange={e => setNewGeminiKey(e.target.value.trim())}
                  placeholder="הדבק מפתח API חדש מ-Google AI Studio"
                  style={{ flex: 1, background: G.bg, border: `1px solid ${G.border}`, borderRadius: 8, padding: "9px 12px", color: G.text, fontSize: 12, outline: "none", direction: "ltr", fontFamily: "monospace" }} />
                <button onClick={async () => { if (!newGeminiKey) return; await db.ref("nutrition/_admin/geminiKey").set(newGeminiKey); GEMINI_API_KEY = newGeminiKey; setSaved("gemini"); setNewGeminiKey(""); setTimeout(() => setSaved(""), 2000); }}
                  disabled={!newGeminiKey}
                  style={{ background: newGeminiKey ? "#166534" : "#1a3a1f", border: "none", borderRadius: 8, padding: "9px 16px", color: "#fff", fontWeight: 700, fontSize: 13, cursor: newGeminiKey ? "pointer" : "default", fontFamily: "inherit" }}>

    // ─── PIN ──────────────────────────────────────────────────────────────────────
    function PinScreen({ onSuccess, onBack }) {
      const [pin, setPin] = useState("");
      const [error, setError] = useState(false);
      const [correctPin, setCorrectPin] = useState(null);
      const inputRef = React.useRef(null);

      useEffect(() => {
        inputRef.current?.focus();
        db.ref("nutrition/_admin/matanPin").once("value", snap => {
          setCorrectPin(snap.exists() ? snap.val() : "1359");
        });
      }, []);

      const check = (p) => {
        if (correctPin === null) return;
        if (p === correctPin) {
          localStorage.setItem("matan_pin_ok", "1");
          onSuccess();
        } else if (p.length === 4) {
          setError(true);
          setTimeout(() => { setError(false); setPin(""); }, 800);
        }
      };

      const press = (d) => {
        const next = pin + d;
        setPin(next);
        if (next.length === 4 && correctPin !== null) check(next);
      };

      const handleKey = (e) => {
        if (e.key >= "0" && e.key <= "9") press(e.key);
        else if (e.key === "Backspace") setPin(p => p.slice(0, -1));
        else if (e.key === "Escape") onBack();
      };

      return (
        <div onKeyDown={handleKey} tabIndex={0} ref={inputRef} style={{ minHeight: "100vh", background: "linear-gradient(160deg,#080f0a 0%,#0a1520 60%,#080f0a 100%)", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 28, fontFamily: "'Segoe UI',Tahoma,sans-serif", outline: "none" }}>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#4ade80" }}>👤 Matan</div>
          <div style={{ display: "flex", gap: 12, marginBottom: 4 }}>
            {[0,1,2,3].map(i => (
              <div key={i} style={{ width: 16, height: 16, borderRadius: "50%", background: pin.length > i ? (error ? "#f87171" : "#4ade80") : "#1a3a1f", border: "2px solid " + (error ? "#f87171" : "#2d5a3a"), transition: "all 0.15s" }} />
            ))}
          </div>
          {error && <div style={{ color: "#f87171", fontSize: 13, marginTop: -16 }}>קוד שגוי</div>}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 70px)", gap: 10, direction: "ltr" }}>
            {[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map((d, i) => (
              <button key={i} onClick={() => {
                if (d === "⌫") setPin(p => p.slice(0,-1));
                else if (d !== "") press(String(d));
              }} style={{ height: 70, borderRadius: 14, border: "1px solid #1a3a1f", background: d === "" ? "transparent" : "#0d1f10", color: d === "⌫" ? "#f87171" : "#e0f0e0", fontSize: d === "⌫" ? 20 : 24, fontWeight: 600, cursor: d === "" ? "default" : "pointer", fontFamily: "inherit", transition: "background 0.1s" }}
                onTouchStart={e => e.currentTarget.style.background = d === "" ? "transparent" : "#1a3a1f"}
                onTouchEnd={e => e.currentTarget.style.background = d === "" ? "transparent" : "#0d1f10"}>
                {d}
              </button>
            ))}
          </div>
          <button onClick={onBack} style={{ background: "transparent", border: "none", color: "#4a7a54", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>← חזור</button>
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────────
    function NutritionApp() {
      const [tab, setTab] = useState("plan");
      const [activeUser, setActiveUser] = useState(localStorage.getItem("active_user") || null);
      const [pinOk, setPinOk] = useState(localStorage.getItem("matan_pin_ok") === "1");
      const [adminMode, setAdminMode] = useState(false);
      const [adminAuthed, setAdminAuthed] = useState(false);

      const selectUser = (u) => {
        localStorage.setItem("active_user", u);
        setActiveUser(u);
      };

      const logout = () => {
        localStorage.removeItem("active_user");
        localStorage.removeItem("matan_pin_ok");
        setActiveUser(null);
        setPinOk(false);
      };

      if (adminMode && !adminAuthed) return <AdminPinScreen onSuccess={() => setAdminAuthed(true)} onBack={() => setAdminMode(false)} />;
      if (adminMode && adminAuthed) return <AdminPanel onBack={() => { setAdminMode(false); setAdminAuthed(false); }} />;
      if (!activeUser) return <UserSelect onSelect={selectUser} onAdmin={() => setAdminMode(true)} />;
      if (activeUser === "matan" && !pinOk) return <PinScreen onSuccess={() => setPinOk(true)} onBack={() => { localStorage.removeItem("active_user"); setActiveUser(null); }} />;
      CURRENT_USER = activeUser;
      return (
        <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#080f0a 0%,#0a1520 60%,#080f0a 100%)", fontFamily: "'Segoe UI',Tahoma,sans-serif", direction: "rtl", color: "#e0f0e0", paddingBottom: 40 }}>
          <div style={{ padding: "12px 14px 10px", borderBottom: "1px solid #1a3a1f", background: "rgba(0,0,0,0.45)", backdropFilter: "blur(10px)", position: "sticky", top: 0, zIndex: 20 }}>
            <div style={{ maxWidth: 520, margin: "0 auto" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontSize: 12, color: "#4a7a54" }}>{activeUser === "matan" ? "👤 Matan" : "🙂 Guest"}</span>
                <button onClick={logout} style={{ background: "#1a0f0f", border: "1px solid #3a1a1a", borderRadius: 8, color: "#f87171", fontSize: 11, fontWeight: 700, cursor: "pointer", fontFamily: "inherit", padding: "4px 10px" }}>🚪 יציאה</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 5, background: "#0a1a0c", borderRadius: 11, padding: 4, border: "1px solid #1e4a2e" }}>
                {[["plan","תפריט","🍽️"],["checklist","צ׳קליסט","✅"],["weight","משקל","⚖️"]].map(([k,l,e]) => (
                  <button key={k} onClick={() => setTab(k)} style={{ padding: "8px 4px", borderRadius: 8, border: "none", cursor: "pointer", fontSize: 12, fontWeight: 700, fontFamily: "inherit", transition: "all 0.2s", background: tab === k ? "linear-gradient(135deg,#166534,#166534bb)" : "transparent", color: tab === k ? "#fff" : "#4a7a54" }}>
                    {e} {l}
                  </button>
                ))}
              </div>
            </div>
          </div>
          <div style={{ maxWidth: 520, margin: "0 auto" }}>
            {tab === "plan" ? <PlanTab /> : tab === "checklist" ? <ChecklistTab /> : <WeightTab />}
            <div style={{ textAlign: "center", padding: "10px 14px", fontSize: 10, color: "#2a4a2a" }}>⚠️ יש להתייעץ עם דיאטנית/רופא לפני שינויים תזונתיים משמעותיים</div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<NutritionApp />);
  </script>
</body>
</html>
